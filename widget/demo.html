<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget Demo</title>
  <style>
    body { font-family: sans-serif; background: #f8fafc; padding: 60px; color: #334155; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p { color: #64748b; }
  </style>
</head>
<body>
  <h1>Widget Demo Page</h1>
  <p>The chat bubble should appear in the bottom-right corner.</p>
  <p>Replace <code>YOUR_API_TOKEN</code> with your real token from the dashboard.</p>

  <!-- Replace the token below with yours -->
  <script
    src="./widget.js"
    data-token="YOUR_API_TOKEN"
    data-bot-name="Support Bot"
    data-backend="http://localhost:3001"
    defer
  ></script>
</body>
</html>
